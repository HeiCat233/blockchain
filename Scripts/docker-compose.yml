# ============================================================
# Docker Compose 配置模板
# 适用于：基于区块链技术的分布式数字身份系统
# 使用说明：docker-compose up -d
# ============================================================

version: "3.8"

services:
  # -----------------------------
  # 示例：以太坊私有链 (Ganache)
  # 用于本地开发和测试智能合约
  # -----------------------------
  ganache:
    image: trufflesuite/ganache:latest
    container_name: blockchain-ganache
    ports:
      - "8545:8545"
    volumes:
      - ganache-data:/ganache-data
    command:
      - --database.dbPath=/ganache-data
      - --server.host=0.0.0.0
      - --server.port=8545
      - --wallet.accounts="0x${GANACHE_PRIVATE_KEY:-4f3edf983ac636a65a842ce7c78d9aa706d3b113bce9c46f30d7d21715b23b1d},100000000000000000000"
      - --wallet.accounts="0x${GANACHE_PRIVATE_KEY_2:-6cbed15c793ce57650b9877cf6fa156fbef513c4e6134f022a85b1ffdd59b2a1},100000000000000000000"
      - --chain.chainId=1337
      - --logging.verbose
    networks:
      - identity-network

  # -----------------------------
  # 示例：IPFS 节点
  # 用于分布式存储身份凭证哈希
  # -----------------------------
  ipfs:
    image: ipfs/kubo:latest
    container_name: blockchain-ipfs
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs-data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
      - IPFS_SWARM_KEY=/key/swarm
    networks:
      - identity-network

  # -----------------------------
  # 示例：PostgreSQL 数据库
  # 用于存储链下身份元数据
  # -----------------------------
  postgres:
    image: postgres:15-alpine
    container_name: identity-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-identity_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-identity_pass}
      POSTGRES_DB: ${POSTGRES_DB:-identity_db}
    networks:
      - identity-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # 示例：Redis 缓存
  # 用于会话管理和 DID 文档缓存
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: identity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - identity-network
    command: redis-server --appendonly yes

# -----------------------------
# 持久化数据卷
# -----------------------------
volumes:
  ganache-data:
    driver: local
  ipfs-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

# -----------------------------
# 网络配置
# -----------------------------
networks:
  identity-network:
    driver: bridge
    name: identity-network
